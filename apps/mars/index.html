<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Going to Mars</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
	
    html, body {
	  overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Poppins', sans-serif;
      background-image: url('img/main.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
    }

    .object-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    a {
      text-decoration: none;
    }

    img {
      max-width: 100%;
      height: auto;
      border: 0;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="object-wrapper">
    <a href="https://mars.nasa.gov/layout/embed/send-your-name/future/certificate/?cn=404300875273" target="_blank">
      <img src="img/Marios-Evripidou.jpg" alt="Mars Certificate for Marios Evripidou" width="980" height="410">
    </a>
    <a href="https://mars.nasa.gov/layout/embed/send-your-name/future/certificate/?cn=18348204429" target="_blank">
      <img src="img/Zouzou-Evripidou.jpg" alt="Mars Certificate for Zouzou Evripidou" width="980" height="410">
    </a>
  </div>
</body>
</html>
