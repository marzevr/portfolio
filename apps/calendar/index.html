<!DOCTYPE html>
<html lang="en">
<head>
  
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Redirecting to Google Calendar</title>
	<meta http-equiv="refresh" content="2; url=https://calendar.google.com/calendar/u/0/r">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<meta name="description" content="Redirecting you to Google Calendar.">
	<meta name="author" content="Marios Evripidou">

	<!-- Robots -->
	<meta name="robots" content="noindex, nofollow">
	<!-- Open Graph -->
	<meta property="og:title" content="Redirecting to Google Calendar">
	<meta property="og:description" content="Redirecting you to Google Calendar.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://marios.evripidou.me/apps/calendar/index.html">

	<!-- Other Enhancements -->
	<meta name="theme-color" content="#306AC0">
	<meta name="copyright" content="© 2025 Marios Evripidou">
	<meta name="referrer" content="no-referrer-when-downgrade">
	<meta http-equiv="Content-Language" content="en">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script defer src="https://unpkg.com/feather-icons"></script>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  
  <!-- Styles -->
  <style>
	:root {
	  --bg: #ffffff;
	  --bg-alt: #f7f9fc;
	  --text: #111827;
	  --text-dim: #6b7280;
	  --primary: #306AC0;
	  --primary-light: #e6f0ff;
	  --border: #e5e7eb;
	  --radius: 14px;
	  --maxw: 1120px;
	  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
	  --shadow-md: 0 6px 18px rgba(0,0,0,.06);
	}

	*,
	*::before,
	*::after { box-sizing: border-box; }

	html { scroll-behavior: smooth; }

	body {
	  margin: 0;
	  font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif; 
	  /* font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;*/ 
	  color: var(--text);
	  background: var(--bg);
	  line-height: 1.6;
	  font-size: 16px;
	}

	img { max-width: 100%; display: block; }

	.container {
	  width: 100%;
	  max-width: var(--maxw);
	  margin: 0 auto;
	  padding: 0 1.25rem;
	}

	.section {
	  padding: 80px 0;
	}

	.section.alt {
	  background: var(--bg-alt);
	}

	.section-title {
	  font-size: 1.875rem;
	  font-weight: 700;
	  margin: 0 0 2rem;
	}

	.sub-title {
	  margin: 0 0 1rem;
	  font-weight: 600;
	  color: var(--text);
	}

	.tag {
	  display: inline-block;
	  background: #e6efff;
	  color: var(--primary);
	  font-size: 0.75rem;
	  font-weight: 600;
	  padding: 2px 6px;
	  border-radius: 999px;
	  margin-bottom: .5rem;
	}

	/* SR-only */
	.sr-only {
	  position: absolute !important;
	  height: 1px; width: 1px;
	  overflow: hidden;
	  clip: rect(1px,1px,1px,1px);
	}

	.site-header {
	  position: sticky;
	  top: 0;
	  z-index: 999;
	  background: rgba(255,255,255,.75);
	  backdrop-filter: blur(10px);
	  border-bottom: 1px solid rgba(0,0,0,.04);
	}

	.header-inner {
	  display: flex;
	  align-items: center;
	  justify-content: space-between;
	  height: 64px;
	}

	.brand {
	  display: flex;
	  align-items: center;
	  font-weight: 700;
	  color: var(--text);
	  text-decoration: none;
	  gap: 8px; /* space between logo and text */
	}

	.brand-logo {
	  width: 35px;
	  height: 35px;
	  object-fit: cover;
	  border-radius: 50%;
	  display: inline-block;
	}

	body.error-page {
	  display: flex;
	  flex-direction: column;
	  min-height: 100vh;
	}
	main.error-container {
	  flex: 1;
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  justify-content: center;
	  text-align: center;
	  padding: 2rem 1rem;
	}
	main.error-container h1 {
	  font-size: 2.5rem;
	  margin-bottom: 1rem;
	}
	main.error-container p {
	  font-size: 1.1rem;
	  color: var(--text-dim);
	  margin-bottom: 2rem;
	}
	
	.site-footer {
	  border-top: 1px solid var(--border);
	  background: #fff;
	  text-align: center;
	  padding: 28px 0 40px;
	  color: var(--text-dim);
	  font-size: .9rem;
	}
	
	.btn {
	  display: inline-flex;
	  align-items: center;
	  justify-content: center;
	  padding: 0.5rem 1rem;
	  border-radius: 999px;
	  font-weight: 600;
	  font-size: 0.95rem;
	  text-decoration: none;
	  transition: all 0.2s ease;
	  border: 2px solid transparent;
	  cursor: pointer;
	  min-width: 140px;
	  text-align: center;
	}
	.btn.primary {
	  background: var(--primary);
	  color: #fff;
	}
	.btn.primary:hover {
	  filter: brightness(0.95);
	}
	.btn.outline {
	  color: var(--primary);
	  border-color: var(--primary);
	  background: transparent;
	}
	.btn.outline:hover {
	  background: rgba(48,106,192,0.08);
	}

	.button-group {
	  display: flex;
	  gap: 0.75rem;
	  justify-content: flex-start;
	  flex-wrap: wrap;
	  margin-top: 0rem;
	}

	@media (max-width: 640px) {
	  .button-group {
		justify-content: center;
	  }
	}
  </style>
</head>
<body class="error-page">

  <!-- ========== Header ========== -->
  <header class="site-header" id="top">
    <div class="container header-inner">
	<a href="https://marios.evripidou.me" class="brand">
	  <img src="https://marios.evripidou.me/assets/img/logo.jpg" alt="Logo" class="brand-logo" />
	  Marios Evripidou
	</a>
  </header>

	<!-- ========== Error Message ========== -->
	<main class="error-container">
	  <div>
		<h1>Redirecting</h1>
		<p>You are being redirected to Google Calendar.</p>
		<a href="https://marios.evripidou.me" class="btn primary">Back to Home</a>
	  </div>
	</main>

<!-- ========== Footer ========== -->
<footer class="site-footer">
  <div class="container">
    <p>
      © <span id="year"></span> 
      <a href="https://marios.evripidou.me" target="_blank" rel="noopener" style="text-decoration: none; color: inherit;">
        Marios Evripidou
      </a>. All rights reserved.
      &nbsp;|&nbsp;
      <a href="https://marios.evripidou.me/privacy-policy.html" target="_blank" rel="noopener" style="text-decoration: none; color: inherit;">Privacy Policy</a>
    </p>
  </div>
</footer>

  <!-- ======= Scripts ======= -->
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const yearSpan = document.getElementById("year");
    if (yearSpan) {
      yearSpan.textContent = new Date().getFullYear();
    }
  });
  </script>
  
</body>
</html>
